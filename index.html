<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1f1e1d"/>
<title>Damru AI — Your Smart Companion</title>
<meta name="description" content="Damru AI — a smart general-purpose AI for coding, maths, writing, general knowledge and exam prep. Reads images, replies in your language. Made by SHIVA AI."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#262624; --sidebar:#1f1e1d; --panel:#30302d; --panel2:#3a3a36;
  --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.14);
  --accent:#d97757; --accent2:#e08a6c;
  --text:#f5f4ee; --text2:#c9c6bd; --muted:#8f8c83;
  --user:#34332e;
  --serif:'Source Serif 4',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;display:flex;height:100dvh}

/* ===== Sidebar ===== */
.sb{width:272px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100dvh}
.sb-top{display:flex;align-items:center;justify-content:space-between;padding:15px 14px 10px}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--serif);font-size:1.18rem;font-weight:600;color:var(--text)}
.burst{color:var(--accent);font-size:1.3rem;line-height:1}
.newbtn{margin:4px 12px 8px;display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:11px;background:transparent;border:1px solid var(--border2);color:var(--text);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.newbtn:hover{background:var(--panel)}
.newbtn .ic{color:var(--accent);font-size:1rem}
.sb-sec{padding:12px 18px 6px;font-size:0.7rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.chatlist{flex:1;overflow-y:auto;padding:0 8px;display:flex;flex-direction:column;gap:1px}
.chatlist::-webkit-scrollbar{width:6px}.chatlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.chatitem{display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:9px;cursor:pointer;color:var(--text2);font-size:0.86rem;transition:background .14s;position:relative}
.chatitem:hover{background:var(--panel)}
.chatitem.active{background:var(--panel2);color:var(--text)}
.ci-t{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-x{opacity:0;width:22px;height:22px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:6px;font-size:1.05rem;flex-shrink:0;line-height:1}
.chatitem:hover .ci-x{opacity:1}
.ci-x:hover{background:var(--border2);color:var(--text)}
.sb-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;border-top:1px solid var(--border)}
.brain{font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ico{width:36px;height:36px;border-radius:9px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.05rem;transition:all .15s;flex-shrink:0}
.ico:hover{background:var(--panel);color:var(--text)}
.backdrop{display:none}

/* ===== Main ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100dvh;position:relative}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(38,38,36,0.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20}
.menu-btn{display:none}
.model{margin:0 auto;display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:11px;background:transparent;border:1px solid var(--border);color:var(--text);font-size:0.86rem;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.model:hover{background:var(--panel)}
.model b{color:var(--accent);font-weight:600}
.model span{font-size:0.68rem;color:var(--muted)}

/* Chat */
.chat{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;padding:18px 0 6px}
.chat::-webkit-scrollbar{width:7px}.chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Welcome */
.welcome{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;gap:6px}
.wc-burst{font-size:3.1rem;color:var(--accent);animation:spin 9s linear infinite;line-height:1;margin-bottom:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.wc-hi{font-family:var(--serif);font-size:2rem;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.wc-sub{color:var(--text2);font-size:0.92rem;max-width:480px;line-height:1.6;margin-top:6px}
.chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:24px;max-width:580px}
.chip{padding:10px 15px;border-radius:12px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all .16s;display:flex;align-items:center;gap:7px}
.chip:hover{background:var(--panel2);transform:translateY(-1px)}
.chip:active{transform:scale(0.97)}

/* Messages */
.msg{display:flex;gap:13px;width:100%;max-width:760px;margin:0 auto;padding:14px 22px;animation:rise .3s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.95rem;margin-top:1px}
.msg.ai .msg-av{background:var(--accent);color:#fff}
.msg.user .msg-av{background:var(--panel2);border:1px solid var(--border2)}
.bubble{flex:1;min-width:0;line-height:1.72;font-size:0.96rem;word-wrap:break-word;overflow-wrap:anywhere;padding-top:3px}
.msg.user .bubble{color:var(--text)}
.bubble p{margin:0 0 10px}.bubble p:last-child{margin-bottom:0}
.bubble h1,.bubble h2,.bubble h3{margin:15px 0 9px;line-height:1.3;font-family:var(--serif);color:var(--text)}
.bubble h1{font-size:1.24rem}.bubble h2{font-size:1.1rem}.bubble h3{font-size:1rem}
.bubble ul,.bubble ol{margin:7px 0 11px;padding-left:22px}
.bubble li{margin:4px 0}
.bubble strong{color:var(--text);font-weight:600}
.bubble em{color:var(--text2)}
.bubble a{color:var(--accent2);text-decoration:underline}
.bubble code{background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:5px;font-family:'Courier New',monospace;font-size:0.85em;color:#f0b88f}
.bubble pre{background:#1a1a18;border:1px solid var(--border2);border-radius:12px;padding:14px;overflow-x:auto;margin:11px 0;position:relative}
.bubble pre code{background:none;padding:0;color:#e8e5dc;font-size:0.83rem;line-height:1.6;display:block}
.pre-cp{position:absolute;top:8px;right:8px;background:var(--panel2);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:0.65rem;padding:3px 9px;cursor:pointer;opacity:0.85}
.pre-cp:hover{color:var(--text)}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:13px;margin:9px 0;color:var(--text2)}
.bubble table{border-collapse:collapse;margin:11px 0;width:100%;font-size:0.86rem}
.bubble th,.bubble td{border:1px solid var(--border2);padding:7px 10px;text-align:left}
.bubble th{background:var(--panel2);color:var(--text)}

.acts{display:flex;gap:3px;margin-top:9px;opacity:0.65;transition:opacity .2s}
.acts:hover{opacity:1}
.act{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid transparent;color:var(--muted);cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.act:hover{background:var(--panel);color:var(--text)}

.typing{display:flex;gap:4px;padding:6px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.3s infinite}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-7px);opacity:1}}
.intent-tag{display:inline-block;font-size:0.6rem;color:var(--accent2);background:rgba(217,119,87,0.13);border:1px solid var(--border2);border-radius:6px;padding:1px 7px;margin-bottom:7px;letter-spacing:0.05em;text-transform:uppercase}
.img-wrap{margin-top:4px}
.gen-img{max-width:100%;border-radius:14px;border:1px solid var(--border2);display:block}
.up-img{max-width:230px;border-radius:12px;display:block;border:1px solid var(--border2)}
.img-load{display:flex;align-items:center;gap:9px;color:var(--text2);font-size:0.85rem;padding:8px 0}
.img-acts{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.img-acts .act{width:auto;padding:5px 12px;border:1px solid var(--border2);border-radius:9px;text-decoration:none;color:var(--text2);font-size:0.78rem;display:inline-flex;align-items:center;gap:5px;background:transparent}
.img-acts .act:hover{background:var(--panel);color:var(--text)}

/* Input */
.inp-wrap{padding:8px 16px 16px;max-width:790px;margin:0 auto;width:100%;position:relative}
.inp-box{display:flex;align-items:flex-end;gap:6px;background:var(--panel);border:1px solid var(--border2);border-radius:22px;padding:7px 7px 7px 8px;transition:border-color .2s,box-shadow .2s}
.inp-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,119,87,0.13)}
.inp{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:0.97rem;line-height:1.5;resize:none;max-height:140px;padding:8px 4px}
.inp::placeholder{color:var(--muted)}
.icb{width:38px;height:38px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;transition:all .16s}
.icb:hover{background:var(--panel2);color:var(--text)}
.icb.on{color:var(--accent)}
.send{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;transition:all .16s}
.send:hover{background:var(--accent2)}
.send:disabled{opacity:0.45;cursor:default}
.foot{text-align:center;font-size:0.68rem;color:var(--muted);margin-top:9px}

/* Attach menu */
.attmenu{position:absolute;left:20px;bottom:78px;background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:6px;box-shadow:0 12px 32px rgba(0,0,0,0.45);display:none;flex-direction:column;gap:2px;min-width:180px;z-index:30}
.attmenu.on{display:flex;animation:rise .16s ease}
.ami{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;cursor:pointer;color:var(--text);font-size:0.88rem;transition:background .14s}
.ami:hover{background:var(--panel2)}
.ami span{font-size:1.05rem;width:20px;text-align:center}

/* Settings modal + toast */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.ov.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:18px;padding:22px;max-width:400px;width:100%}
.modal h3{font-family:var(--serif);font-size:1.15rem;margin-bottom:10px;color:var(--text)}
.modal p{font-size:0.85rem;color:var(--text2);line-height:1.6;margin-bottom:14px}
.modal label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:6px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;color:var(--text);font-family:inherit;font-size:0.9rem;outline:none}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.mb{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:0.86rem;font-weight:500}
.mb-cancel{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.mb-save{background:var(--accent);color:#fff}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:11px;font-size:0.85rem;opacity:0;pointer-events:none;transition:opacity .25s;z-index:120}
.toast.on{opacity:1}

@media(max-width:860px){
  .sb{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%);transition:transform .25s ease}
  body.sb-open .sb{transform:none}
  .backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;opacity:0;visibility:hidden;transition:.25s}
  body.sb-open .backdrop{opacity:1;visibility:visible}
  .menu-btn{display:flex}
  .msg{padding:13px 16px}
  .wc-hi{font-size:1.7rem}
}
</style>
</head>
<body>

<aside class="sb" id="sb">
  <div class="sb-top">
    <div class="brand"><span class="burst">🐕</span> Damru</div>
    <button class="ico" onclick="closeSb()" title="Close" style="display:none" id="sb-close">«</button>
  </div>
  <button class="newbtn" onclick="newChat()"><span class="ic">✎</span> New chat</button>
  <div class="sb-sec">Recents</div>
  <div class="chatlist" id="chatlist"></div>
  <div class="sb-foot">
    <div class="brain" id="hd-sub">🧠 learning 24/7</div>
    <button class="ico" onclick="openSettings()" title="Settings">⚙</button>
  </div>
</aside>
<div class="backdrop" id="backdrop" onclick="closeSb()"></div>

<main class="main">
  <div class="topbar">
    <button class="ico menu-btn" onclick="toggleSb()" title="Menu">☰</button>
    <button class="model" onclick="openSettings()"><b>Damru</b> Beast <span>v1</span></button>
    <button class="ico" onclick="newChat()" title="New chat">✎</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inp-wrap">
    <div class="attmenu" id="attmenu">
      <div class="ami" onclick="document.getElementById('camfile').click();closeAtt()"><span>📷</span> Camera</div>
      <div class="ami" onclick="document.getElementById('imgfile').click();closeAtt()"><span>🖼️</span> Photos</div>
      <div class="ami" onclick="document.getElementById('docfile').click();closeAtt()"><span>📎</span> Files</div>
    </div>
    <input type="file" id="camfile" accept="image/*" capture="environment" style="display:none" onchange="onImgPick(event)"/>
    <input type="file" id="imgfile" accept="image/*" style="display:none" onchange="onImgPick(event)"/>
    <input type="file" id="docfile" accept="image/*,application/pdf" style="display:none" onchange="onFilePick(event)"/>
    <div class="inp-box">
      <button class="icb" onclick="toggleAtt(event)" title="Add photo / file">＋</button>
      <textarea class="inp" id="inp" rows="1" placeholder="Ask Damru anything…" oninput="autoH(this)" onkeydown="keyHandler(event)"></textarea>
      <button class="icb" id="mic" onclick="micToggle()" title="Voice input">🎙️</button>
      <button class="send" id="send" onclick="send()" title="Send">➤</button>
    </div>
    <div class="foot">Damru AI can make mistakes — please verify important info. · v1.0 Beast</div>
  </div>
</main>

<div class="ov" id="ov">
  <div class="modal">
    <h3>⚙ Settings</h3>
    <p>Damru runs on a <b>free keyless engine</b> (Pollinations) by default. For a stronger fallback and image reading, you can add your own OpenRouter key (optional).</p>
    <label>OpenRouter API Key (optional)</label>
    <input type="password" id="or-key" placeholder="sk-or-v1-…"/>
    <div class="modal-btns">
      <button class="mb mb-cancel" onclick="closeSettings()">Cancel</button>
      <button class="mb mb-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DAMRU AI — Standalone Beast Brain  (Claude-style UI)
   Engine: Pollinations (keyless) -> OpenRouter free models
   ============================================================ */
const OR_URL = 'https://openrouter.ai/api/v1/chat/completions';
const FREE_MODELS = [
  'deepseek/deepseek-chat-v3-0324:free',
  'meta-llama/llama-3.3-70b-instruct:free',
  'google/gemini-2.0-flash-exp:free',
  'qwen/qwen-2.5-72b-instruct:free'
];
const MODEL_ROUTES = {
  code:    ['qwen/qwen-2.5-coder-32b-instruct:free','deepseek/deepseek-chat-v3-0324:free','qwen/qwen-2.5-72b-instruct:free','meta-llama/llama-3.3-70b-instruct:free'],
  math:    ['deepseek/deepseek-chat-v3-0324:free','qwen/qwen-2.5-72b-instruct:free','meta-llama/llama-3.3-70b-instruct:free'],
  exam:    ['google/gemini-2.0-flash-exp:free','meta-llama/llama-3.3-70b-instruct:free','deepseek/deepseek-chat-v3-0324:free'],
  general: ['google/gemini-2.0-flash-exp:free','deepseek/deepseek-chat-v3-0324:free','meta-llama/llama-3.3-70b-instruct:free','qwen/qwen-2.5-72b-instruct:free'],
  creative:['meta-llama/llama-3.3-70b-instruct:free','google/gemini-2.0-flash-exp:free','deepseek/deepseek-chat-v3-0324:free'],
  chat:    ['google/gemini-2.0-flash-exp:free','meta-llama/llama-3.3-70b-instruct:free']
};
let OR_KEY = localStorage.getItem('damru_or_key') || '';

const SB_URL = 'https://ukhknkkjudxpaxuwizxj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVraGtua2tqdWR4cGF4dXdpenhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjU2ODUsImV4cCI6MjA5NzcwMTY4NX0.tU7XdfxiVO9ZIDs1_hd52iOJZ6KocOGyN5cu9i0q7pU';
const SB_H = { apikey: SB_KEY, Authorization: 'Bearer '+SB_KEY, 'Content-Type':'application/json', Prefer:'return=minimal' };

/* ---- State (multi-session, Claude-style) ---- */
let chats = [];        // [{id,title,ts,history}]
let curId = null;
let history = [];      // current chat history: {role,content,q?,intent?}
let busy = false;
let pendingLearn = null;
const savedQs = new Set();
const NEG_RE = /\b(wrong|incorrect|not correct|galat|galt|nahi|nahin|bekaar|bekar|useless|theek nahi|samajh nahi|fix this|thats wrong|not right)\b|गलत|नहीं/i;

function uid(){ return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function loadChats(){
  try{ chats=JSON.parse(localStorage.getItem('damru_chats')||'[]'); }catch(e){ chats=[]; }
  if(!Array.isArray(chats)) chats=[];
  if(!chats.length){
    try{ const old=JSON.parse(localStorage.getItem('damru_history')||'[]');
      if(old.length){ const f=old.find(h=>h.role==='user'); chats=[{id:uid(),title:(f?f.content:'Chat').slice(0,40),ts:Date.now(),history:old}]; persistChats(); }
    }catch(e){}
  }
}
function persistChats(){ try{ localStorage.setItem('damru_chats',JSON.stringify(chats.slice(0,60))); }catch(e){} }
function curChat(){ return chats.find(c=>c.id===curId); }
function saveCur(){
  let c=curChat();
  if(!c){ c={id:curId||uid(),title:'New chat',ts:Date.now(),history:[]}; curId=c.id; chats.unshift(c); }
  c.history=history; c.ts=Date.now();
  const f=history.find(h=>h.role==='user');
  if(f && (!c.title || c.title==='New chat')) c.title=f.content.replace(/\n/g,' ').slice(0,40);
  chats=chats.filter(x=>x.id!==c.id); chats.unshift(c);
  localStorage.setItem('damru_current',c.id);
  persistChats(); renderChatList();
}
function renderChatList(){
  const el=document.getElementById('chatlist'); if(!el) return; el.innerHTML='';
  if(!chats.length){ el.innerHTML='<div style="padding:10px 12px;color:var(--muted);font-size:0.8rem">No chats yet</div>'; return; }
  chats.forEach(c=>{
    const d=document.createElement('div'); d.className='chatitem'+(c.id===curId?' active':'');
    d.onclick=()=>openChat(c.id);
    const t=document.createElement('span'); t.className='ci-t'; t.textContent=c.title||'New chat';
    const x=document.createElement('button'); x.className='ci-x'; x.textContent='×'; x.title='Delete';
    x.onclick=(e)=>{ e.stopPropagation(); delChat(c.id); };
    d.appendChild(t); d.appendChild(x); el.appendChild(d);
  });
}
function openChat(id){
  const c=chats.find(x=>x.id===id); if(!c) return;
  curId=id; history=c.history||[]; localStorage.setItem('damru_current',id);
  pendingLearn=null; renderMessages(); renderChatList(); closeSb();
}
function delChat(id){
  chats=chats.filter(c=>c.id!==id); persistChats();
  if(curId===id){ if(chats.length){ openChat(chats[0].id); } else { newChat(); } }
  else renderChatList();
}

function detectIntent(msg){
  const m = ' ' + msg.toLowerCase() + ' ';
  if(/\b(wallpaper|logo|poster)\b|(image|images|photo|picture|pic|tasveer|tasvir|chitra|drawing|sketch)[^.?!]{0,30}(banao|bana do|bana de|draw|generate|create|design|chahiye)|(banao|bana do|draw|generate|create|design)[^.?!]{0,30}(image|photo|picture|tasveer|chitra|wallpaper|logo|poster|drawing)/.test(m)) return 'imagegen';
  if(/```|\b(code|function|program|script|debug|error|bug|algorithm|api|regex|sql query|html|css|javascript|python|java|c\+\+|react|node)\b|code likho|program likho/.test(m)) return 'code';
  if(/\b(solve|calculate|equation|integral|derivative|probability|percentage|ratio|trigonometry|geometry|algebra)\b|\d+\s*[\+\-\*\/x÷]\s*\d+|hisab|ganit|sawaal solve|step by step solve/.test(m)) return 'math';
  if(/\b(essay|poem|story|letter|application|speech|paragraph|nibandh|kavita|kahani|patra|shayari|slogan)\b|likh kar do|likhkar do|likh do/.test(m)) return 'creative';
  if(/\b(cet|ras|reet|rpsc|patwari|upsc|ssc|syllabus|pyq|previous year|polity|constitution|panchayati|current affairs)\b|exam|rajasthan gk|study plan|revision|notes banao/.test(m)) return 'exam';
  if(/\b(hi|hello|hey|namaste|kaise ho|kaun ho|thanks|thank you|shukriya|bye|ok|theek)\b/.test(m) && msg.length < 40) return 'chat';
  return 'general';
}

async function pollinations(messages,maxTokens,temp){
  const res = await fetch('https://text.pollinations.ai/openai', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'openai', messages, max_tokens:maxTokens, temperature:temp, seed:Math.floor(Math.random()*1e6), referrer:'damru-ai' })
  });
  if(!res.ok){ const t=await res.text(); throw new Error('Pollinations '+res.status+' '+t); }
  const ct=res.headers.get('content-type')||'';
  if(ct.indexOf('application/json')!==-1){ const d=await res.json(); return d?.choices?.[0]?.message?.content||''; }
  return await res.text();
}
async function openrouter(model,messages,maxTokens,temp){
  const h={'Content-Type':'application/json'};
  if(OR_KEY){ h['Authorization']='Bearer '+OR_KEY; h['HTTP-Referer']='https://damru-ai.vercel.app'; h['X-Title']='Damru AI'; }
  const res=await fetch(OR_URL,{ method:'POST', headers:h, body:JSON.stringify({ model, messages, max_tokens:maxTokens, temperature:temp }) });
  if(!res.ok){ const t=await res.text(); throw new Error('OR '+res.status+' '+t); }
  const d=await res.json(); return d?.choices?.[0]?.message?.content||'';
}
async function engine(messages,maxTokens,temp,intent){
  let lastErr;
  const routed = MODEL_ROUTES[intent] || FREE_MODELS;
  const heavy = (intent==='code'||intent==='math');
  if(heavy && OR_KEY){
    for(const m of routed){
      try{ const o=await openrouter(m,messages,maxTokens,temp); if(o&&o.trim()) return o; }catch(e){ lastErr=e; }
    }
  }
  try{ const p=await pollinations(messages,maxTokens,temp); if(p&&p.trim()) return p; }catch(e){ lastErr=e; }
  if(OR_KEY){
    for(const m of routed){
      try{ const o=await openrouter(m,messages,maxTokens,temp); if(o&&o.trim()) return o; }catch(e){ lastErr=e; }
    }
  }
  throw lastErr || new Error('All engines are busy right now. Please try again in a moment.');
}

/* ============================================================
   MARKDOWN RENDERER
   ============================================================ */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderMD(text){
  const blocks=[];
  text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{ blocks.push('<pre><button class="pre-cp" onclick="cpCode(this)">copy</button><code>'+esc(code.replace(/\n$/,''))+'</code></pre>'); return '\u0000B'+(blocks.length-1)+'\u0000'; });
  text=esc(text);
  text=text.replace(/^\|(.+)\|\n\|[\s:|-]+\|\n((?:\|.*\|\n?)*)/gm,(m,head,body)=>{
    const th=head.split('|').map(s=>s.trim()).filter(s=>s).map(s=>'<th>'+s+'</th>').join('');
    const rows=body.trim().split('\n').map(r=>'<tr>'+r.split('|').map(s=>s.trim()).filter((s,i,a)=>i>0&&i<a.length-1||(i===0&&s)||(i===a.length-1&&s)).map(s=>'<td>'+s+'</td>').join('')+'</tr>').join('');
    return '<table><thead><tr>'+th+'</tr></thead><tbody>'+rows+'</tbody></table>';
  });
  text=text
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  const lines=text.split('\n'); let out=''; let inUl=false,inOl=false;
  for(let ln of lines){
    const ulm=ln.match(/^\s*[-*] (.+)$/); const olm=ln.match(/^\s*\d+\. (.+)$/);
    if(ulm){ if(!inUl){ out+='<ul>'; inUl=true; } if(inOl){ out+='</ol>'; inOl=false; } out+='<li>'+ulm[1]+'</li>'; continue; }
    if(olm){ if(!inOl){ out+='<ol>'; inOl=true; } if(inUl){ out+='</ul>'; inUl=false; } out+='<li>'+olm[1]+'</li>'; continue; }
    if(inUl){ out+='</ul>'; inUl=false; } if(inOl){ out+='</ol>'; inOl=false; }
    if(ln.match(/^<(h1|h2|h3|blockquote|table|pre)/)||ln.indexOf('\u0000B')!==-1){ out+=ln; }
    else if(ln.trim()===''){ out+=''; }
    else { out+='<p>'+ln+'</p>'; }
  }
  if(inUl)out+='</ul>'; if(inOl)out+='</ol>';
  out=out.replace(/\u0000B(\d+)\u0000/g,(_,i)=>blocks[+i]);
  return out;
}

   ============================================================ */
async function send(){
  if(busy) return;
  const inp=document.getElementById('inp'); const msg=inp.value.trim();
  if(!msg) return;
  if(pendingLearn){
    if(NEG_RE.test(msg)){ fbLog(pendingLearn.q,pendingLearn.ans,'down'); }
    else { autoLearn(pendingLearn); }
    pendingLearn=null;
  }
  hideWelcome();
  inp.value=''; autoH(inp);
  addMsg('user', esc(msg).replace(/\n/g,'<br>'));
  busy=true; document.getElementById('send').disabled=true;

  const intent=detectIntent(msg);
  const tEl=document.createElement('div'); tEl.className='msg ai';
  tEl.innerHTML='<div class="msg-av">🐕</div><div class="bubble"><span class="intent-tag">'+intent+'</span><div class="typing"><span></span><span></span><span></span></div></div>';
  chatEl.appendChild(tEl); scrollDown();

  if(intent==='imagegen'){
    try{ await handleImage(msg,tEl); history.push({role:'user',content:msg},{role:'assistant',content:'\ud83d\uddbc\ufe0f (generated an image for: '+msg+')',q:msg,intent:'imagegen'}); saveCur(); }
    catch(e){ tEl.remove(); addMsg('ai','⚠️ Image banane me dikkat aayi.'); }
    busy=false; document.getElementById('send').disabled=false; inp.focus(); return;
  }

  try{
    let reply = cacheGet(msg,intent);
    if(!reply){
      let sys = PROMPTS[intent]||PROMPTS.general;
      const learned = await kbSearch(msg);
      if(learned && learned.length){
        sys += "\n\n[KNOWLEDGE BASE] Previously verified Q&A you gave (rely on them or improve if relevant):\n" + learned.map(k=>'Q: '+k.question+'\nA: '+String(k.answer).slice(0,700)).join('\n---\n');
      }
      const ctx = history.slice(-10).map(h=>({role:h.role,content:h.content}));
      const messages=[{role:'system',content:sys}, ...ctx, {role:'user',content:msg}];
      reply = await engine(messages, TOKENS[intent], TEMP[intent], intent);
      cacheSet(msg,intent,reply);
    }
    tEl.remove();
    addMsg('ai', '<span class="intent-tag">'+intent+'</span>'+renderMD(reply), reply, msg, intent);
    history.push({role:'user',content:msg},{role:'assistant',content:reply,q:msg,intent:intent});
    if(history.length>40) history=history.slice(-36);
    saveCur();
    pendingLearn = {q:msg, ans:reply, intent:intent};
  }catch(err){
    tEl.remove();
    addMsg('ai','⚠️ '+esc(err.message||'Connection issue. Please try again.'));
  }
  busy=false; document.getElementById('send').disabled=false;
  inp.focus();
}

let _embedder=null,_embLoading=null;
async function getEmbedder(){
  if(_embedder) return _embedder;
  if(!_embLoading){ _embLoading=(async function(){ const mod=await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2'); mod.env.allowLocalModels=false; _embedder=await mod.pipeline('feature-extraction','Xenova/all-MiniLM-L6-v2'); return _embedder; })(); }
  return _embLoading;
}
async function embedText(t){ const ex=await getEmbedder(); const out=await ex(String(t).slice(0,512),{pooling:'mean',normalize:true}); return Array.from(out.data); }
async function semanticSearch(q){
  if(!_embedder){ getEmbedder(); return []; }
  try{
    const vec=await embedText(q);

    if(r.ok){ const j=await r.json(); if(Array.isArray(j)) return j.filter(function(x){ return x.similarity===undefined||x.similarity>0.3; }); }
  }catch(e){}
  return [];
}

async function visionAsk(dataURL,userText){
  const sys=IDENTITY+' VISION MODE: Carefully read and understand the image / screenshot. If it contains a question or problem (maths, science, exam MCQ, code error etc), solve it step by step and give the final answer in bold. If it is text/notes/a document, extract the key content and explain it simply. If it is a screenshot of an app or website, describe what it shows and suggest helpful next steps or improvements. If it is a diagram or photo, describe and explain it clearly. End with 1-2 short helpful suggestions when useful.'+LANG_RULE;
  const content=[{type:'text',text:(userText&&userText.trim())?userText:'Is image/screenshot ko dhyan se padho aur samjhao. Agar koi sawaal ya problem ho to step-by-step solve karke final answer do, aur ho sake to ek-do helpful suggestion bhi do.'},{type:'image_url',image_url:{url:dataURL}}];
  const messages=[{role:'system',content:sys},{role:'user',content:content}];
  try{ const p=await pollinations(messages,1700,0.4); if(p&&p.trim()) return p; }catch(e){}
  if(OR_KEY){
    for(const m of ['google/gemini-2.0-flash-exp:free','meta-llama/llama-3.2-11b-vision-instruct:free']){
      try{ const o=await openrouter(m,messages,1700,0.4); if(o&&o.trim()) return o; }catch(e){}
    }
  }
  throw new Error('Image samajhne me dikkat aayi. Settings me OpenRouter key add karke dobara try karein.');
}
async function readImageFile(f){
  if(!f||busy) return;
  const reader=new FileReader();
  reader.onload=async function(){
    const dataURL=reader.result;
    hideWelcome();
    const ud=document.createElement('div'); ud.className='msg user';
    ud.innerHTML='<div class="msg-av">🙋</div><div class="bubble"><img src="'+dataURL+'" class="up-img"/></div>';
    chatEl.appendChild(ud); scrollDown();
    busy=true; document.getElementById('send').disabled=true;
    const tEl=document.createElement('div'); tEl.className='msg ai';
    tEl.innerHTML='<div class="msg-av">🐕</div><div class="bubble"><span class="intent-tag">vision</span><div class="typing"><span></span><span></span><span></span></div></div>';
    chatEl.appendChild(tEl); scrollDown();
    try{
      const ans=await visionAsk(dataURL,'');
      tEl.remove(); addMsg('ai','<span class="intent-tag">vision</span>'+renderMD(ans),ans,'[\ud83d\udcf7 image]','vision');
      history.push({role:'user',content:'[\ud83d\udcf7 image]'},{role:'assistant',content:ans,q:'[\ud83d\udcf7 image]',intent:'vision'}); saveCur();
    }
    catch(err){ tEl.remove(); addMsg('ai','⚠️ '+esc(err.message||'Error')); }
    busy=false; document.getElementById('send').disabled=false;
  };
  reader.readAsDataURL(f);
}
function onImgPick(ev){ const f=ev.target.files&&ev.target.files[0]; ev.target.value=''; readImageFile(f); }
function onFilePick(ev){
  const f=ev.target.files&&ev.target.files[0]; ev.target.value=''; if(!f) return;
  if(f.type&&f.type.indexOf('image/')===0){ readImageFile(f); }
  else { toast('PDF/file reading agle update me aa raha hai — abhi photo bhejein'); }
}

/* Live brain size */
async function brainCount(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/damru_knowledge?select=id',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,Prefer:'count=exact',Range:'0-0'}});
    const cr=r.headers.get('content-range')||''; const n=parseInt((cr.split('/')[1]||'0'),10);
    if(n>0){ const sub=document.getElementById('hd-sub'); if(sub) sub.innerHTML='\ud83e\udde0 '+n.toLocaleString()+' learned \u00b7 24/7'; }
  }catch(e){}
}
brainCount(); setInterval(brainCount,60000);
