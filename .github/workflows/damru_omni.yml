# .github/workflows/damru_omni.yml
# STEP 1 runner -- builds Damaru-ai/damru-omni, self-resumes on failure.
#
# WHY a schedule? GitHub Actions runners are ephemeral and jobs cap at ~6h.
# The script mirrors state.json + seen-set to the HF repo, so each scheduled
# run RESUMES exactly where the last one stopped. If a run crashes/times out,
# the next cron picks it up -- "code back kare usko" = automatic recovery.

name: Damru Omni Builder (Step 1)

on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    - cron: "0 */6 * * *"   # every 6h -> auto-resume until fully done

concurrency:
  group: damru-omni         # never run two builders at once (no double data)
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install "datasets>=2.19" "huggingface_hub>=0.24"

      - name: Build unified omni dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OMNI_OUT_REPO: Damaru-ai/damru-omni
          OMNI_SHARD_ROWS: "50000"
          # For a first SMALL test run, set OMNI_MAX_PER_SRC: "2000"
          OMNI_MAX_PER_SRC: "0"
        run: python damru_omni_builder.py
