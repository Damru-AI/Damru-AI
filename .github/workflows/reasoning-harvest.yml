name: Reasoning Harvest (Gurukul)

# Multi-teacher distillation flywheel. ETHIC: OFFLINE ONLY.

on:
  schedule:
    - cron: '0 19 * * *'        # 00:30 IST nightly (19:00 UTC)
  workflow_dispatch:
    inputs:
      curriculum:
        description: 'generic | research (research = PDF mind-map topics)'
        default: 'research'
      angles:
        description: 'Research angles per topic (1-6, 6 = max A-to-Z detail)'
        default: '3'
      per_domain:
        description: 'Questions per domain (generic curriculum only)'
        default: '2'
      min_agreement:
        description: 'Min teacher agreement for numeric answers (0-1)'
        default: '0.6'

concurrency:
  group: reasoning-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install --quiet requests datasets huggingface_hub
      - name: Run Gurukul harvest
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CURRICULUM: ${{ github.event.inputs.curriculum || 'research' }}
          ANGLES: ${{ github.event.inputs.angles || '3' }}
          PER_DOMAIN: ${{ github.event.inputs.per_domain || '2' }}
          MIN_AGREEMENT: ${{ github.event.inputs.min_agreement || '0.6' }}
          TRACES_REPO: Damaru-ai/damru-reasoning-traces
        run: python phase10/reasoning_harvest.py
        
