name: Damru Ingest Book
on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Path to text file in repo, e.g. ingest/sources/gita.txt'
        required: true
        default: 'ingest/sources/source.txt'
      intent:
        description: 'Category tag (general/math/code/exam)'
        required: false
        default: 'general'
      maxChunks:
        description: 'Max chunks to process per run'
        required: false
        default: '60'
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install poppler-utils (PDF support)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Run Damru ingester
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: node ingest/ingest.js "${{ github.event.inputs.file }}" "${{ github.event.inputs.intent }}" "${{ github.event.inputs.maxChunks }}"
        
