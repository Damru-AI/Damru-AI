name: Damru Controlled Learning Pilot v2 (gpt-oss)
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: damru-controlled-learning
  cancel-in-progress: false
jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -q -r phase5/requirements.txt requests
      - name: Run bounded gpt-oss learning pilot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENABLE_LEGACY_PROVIDERS: '0'
          GENERAL_WORKERS: '1'
          ANALYSIS_WORKERS: '1'
          MATH_WORKERS: '1'
          CODING_WORKERS: '2'
          HINDI_WORKERS: '1'
          EXAM_WORKERS: '1'
          SHARD_ID: '0'
          SHARD_TOTAL: '1'
          MAX_RUNTIME_MIN: '20'
          DAILY_TARGET: '5000'
          FOCUS_RATIO: '0.30'
          START_QUALITY: '0.70'
          MAX_QUALITY: '0.90'
          QUALITY_RISE_PER_10K: '0.01'
          ROTATE_EVERY: '100'
          ANSWER_MIN_LINES: '20'
          ANSWER_MAX_LINES: '60'
          ANSWER_MAX_TOKENS: '2048'
        run: python phase5/run_engine.py
        
