# DAMRU AUTOPILOT -- fully automatic, self-running, self-switching, self-training.
# Put at: .github/workflows/damru_autopilot.yml  in repo Damru-AI/Damru-AI
#
# BRAIN = GitHub Actions cron (PUBLIC repo = UNLIMITED free minutes). NO device
# needed. Two jobs:
#   forge  -> every 2h: generate quality data (self-switching teachers) -> HF dataset
#   train  -> daily   : trigger Kaggle "Save & Run All" (self-training on GPU)
#
# ONE-TIME secrets (repo Settings -> Secrets and variables -> Actions):
#   HF_TOKEN, CEREBRAS_API_KEY, OPENROUTER_API_KEY, GITHUB_MODELS_TOKEN
#   KAGGLE_USERNAME, KAGGLE_KEY   (ya KAGGLE_USERNAMES/KAGGLE_KEYS comma-lists)
# Missing keys? forge/trigger unhe skip kar dega -- kabhi crash nahi.
#
# Files needed in repo root: damru_data_forge.py, damru_kaggle_trigger.py,
#                            damru_train_unsloth.py
# Phone se control: Actions tab -> Run workflow (manual) ya cron auto.

name: damru-autopilot

on:
  schedule:
    - cron: "0 */2 * * *"     # FORGE: every 2 hours, 24/7
    - cron: "30 3 * * *"      # TRAIN: once daily (09:00 IST)
  workflow_dispatch:
    inputs:
      job:
        description: "which job to run manually"
        default: "forge"
        type: choice
        options: [forge, train]

concurrency:
  group: damru-autopilot
  cancel-in-progress: false

jobs:
  forge:
    if: github.event.schedule == '0 */2 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'forge')
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -q requests huggingface_hub
      - name: Forge quality data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          DAMRU_DATASET: Damaru-ai/damru-knowledge
          DAMRU_MAX_ITERS: "1200"
          DAMRU_PUSH_EVERY: "40"
          DAMRU_KEEP_SCORE: "4"
        run: python damru_data_forge.py

  train:
    if: github.event.schedule == '30 3 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'train')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -q kaggle
      - name: Trigger Kaggle self-training
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_USERNAMES: ${{ secrets.KAGGLE_USERNAMES }}
          KAGGLE_KEYS: ${{ secrets.KAGGLE_KEYS }}
        run: python damru_kaggle_trigger.py
