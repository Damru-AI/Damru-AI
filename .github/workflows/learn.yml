name: Damru Learn (cron-chunked)

# NOTE: For full 90K/day, run phase5/run_engine.py continuously on a VPS / PC /
# Colab (see phase5/README.md). This workflow is a starter that learns in 110-min
# chunks every 2 hours. GitHub Actions is NOT ideal for 24x7 heavy generation.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: read

concurrency:
  group: damru-learn
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -q -r phase5/requirements.txt
      - name: Run learning engine (chunk)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          STACKEXCHANGE_KEY: ${{ secrets.STACKEXCHANGE_KEY }}
          MAX_RUNTIME_MIN: '110'
        run: python phase5/run_engine.py
        
