# ==============================================================================
# DAMRU GURUKUL LOOP  --  24/7 self-learning brain (GitHub Actions)
# ------------------------------------------------------------------------------
# Closed loop, fully automatic, NO PC / NO phone-on needed:
#   * gurukul job (every 3h) : self-play RLVR data forge on GitHub CPU runner.
#   * train  job (daily)     : triggers GRPO training on Kaggle GPU.
# Public repo => unlimited free Actions minutes.
#
# Repo Settings > Secrets and variables > Actions  (add these):
#   HF_TOKEN, CEREBRAS_API_KEY, OPENROUTER_API_KEY, GITHUB_MODELS_TOKEN,
#   KAGGLE_USERNAME, KAGGLE_KEY   (optionally OWN_MODEL to close the loop)
# ==============================================================================
name: Damru Gurukul Loop

on:
  schedule:
    - cron: "0 */3 * * *"    # gurukul self-play forge, every 3 hours
    - cron: "30 2 * * *"     # GRPO training trigger, daily 02:30 UTC
  workflow_dispatch:
    inputs:
      job:
        description: "which job to run (gurukul | train)"
        required: false
        default: "gurukul"

concurrency:
  group: damru-gurukul
  cancel-in-progress: false

jobs:
  gurukul:
    # run on the 3-hourly cron, or manual dispatch asking for gurukul
    if: >-
      github.event.schedule == '0 */3 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'gurukul')
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --quiet requests sympy huggingface_hub
      - name: Restore gurukul state
        uses: actions/cache@v4
        with:
          path: |
            gurukul_state.json
            gurukul_out
          key: gurukul-state-${{ github.run_id }}
          restore-keys: |
            gurukul-state-
      - name: Run Gurukul self-play
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OWN_MODEL: ${{ secrets.OWN_MODEL }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          DAMRU_DATASET: Damaru-ai/damru-gurukul
          DAMRU_GROUP_SIZE: "6"
          DAMRU_PUSH_EVERY: "20"
          DAMRU_TIME_BUDGET_MIN: "330"
          DAMRU_MAX_ITERS: "0"
        run: python damru_gurukul.py

  train:
    # run on the daily cron, or manual dispatch asking for train
    if: >-
      github.event.schedule == '30 2 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'train')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --quiet kaggle requests
      - name: Trigger GRPO training on Kaggle GPU
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_USERNAMES: ${{ secrets.KAGGLE_USERNAMES }}
          KAGGLE_KEYS: ${{ secrets.KAGGLE_KEYS }}
          KERNEL_CODE_FILE: damru_grpo_train.py
          DAMRU_KERNEL_SLUG: damru-gurukul-grpo
        run: python damru_kaggle_trigger.py
