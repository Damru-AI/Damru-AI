name: Damru Sync to HuggingFace

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'   # daily mirror Supabase -> HuggingFace

permissions:
  contents: read

concurrency:
  group: damru-sync-hf
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -q datasets huggingface_hub requests
      - name: Sync Supabase to HuggingFace
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: Damaru-ai/damru-knowledge
        run: python phase4/sync_to_hf.py
