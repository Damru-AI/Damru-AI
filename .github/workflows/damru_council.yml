name: Damru Council (Step 4)

on:
  workflow_dispatch:
  schedule:
    # offset from omni (:00), oracle (:30), gold (:15) -> council at :45
    - cron: "45 */6 * * *"

concurrency:
  group: damru-council
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests "datasets>=2.19" "huggingface_hub>=0.24" "pyarrow>=15"

      - name: Run council
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # --- solver providers (set whichever you have; council uses any subset) ---
          NVIDIA_NIM_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          # --- judge (non-verifiable problems) ---
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          # --- tuning ---
          COUNCIL_TIME_BUDGET_MIN: "300"
          COUNCIL_N_SOLVERS: "3"
          COUNCIL_CODE_EXEC: "1"
        run: python damru_council.py
