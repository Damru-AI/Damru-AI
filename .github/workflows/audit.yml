name: Damru Dataset Audit (dedup + quality)

on:
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply cleanup and rewrite HF? (true = delete dups, false = report only)'
        default: 'false'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -q pandas pyarrow huggingface_hub
      - name: Dedup + quality audit
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: Damaru-ai/damru-knowledge
          APPLY: ${{ github.event.inputs.apply == 'true' && '1' || '0' }}
        run: python phase4/dedup_audit.py
