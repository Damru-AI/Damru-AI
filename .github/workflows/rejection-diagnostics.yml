name: Damru Rejection Diagnostics v2 (gpt-oss)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -q -r phase5/requirements.txt requests
      - name: Probe gpt-oss and specialists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENABLE_LEGACY_PROVIDERS: '0'
          START_QUALITY: '0.70'
          ANSWER_MIN_LINES: '20'
          ANSWER_MAX_LINES: '60'
          ANSWER_MAX_TOKENS: '2048'
        run: python phase9/rejection_diagnostics.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: damru-rejection-diagnostics-v2
          path: |
            rejection_diagnostics.json
            rejection_diagnostics.md
            
