name: Damru Rejection Diagnostics v1

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: damru-rejection-diagnostics
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -q -r phase5/requirements.txt
      - name: Probe providers and specialist rejection stages
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          START_QUALITY: '0.70'
          MAX_QUALITY: '0.90'
          QUALITY_RISE_PER_10K: '0.01'
          ANSWER_MIN_LINES: '20'
          ANSWER_MAX_LINES: '60'
          ANSWER_MAX_TOKENS: '2048'
          DIAG_SUBJECT: Algebra
        run: python phase9/rejection_diagnostics.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: damru-rejection-diagnostics
          path: |
            rejection_diagnostics.json
            rejection_diagnostics.md
          retention-days: 7
